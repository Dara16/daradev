name: Deploy Portfolio to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to S3 + Invalidate CloudFront
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync files to S3
        run: |
          aws s3 sync . s3://daradev.click \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "README.md" \
            --delete \
            --cache-control "max-age=300"

      - name: Set long cache on media assets
        run: |
          aws s3 cp s3://daradev.click/media/ \
            s3://daradev.click/media/ \
            --recursive \
            --metadata-directive REPLACE \
            --cache-control "max-age=31536000"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E12DOP6A7CGPRU \
            --paths "/*"

      - name: Done
        run: echo "✅ Deployed successfully to daradev.click"
